// Shairport Sync configuration template for Home Assistant.
// Rendered at container start with tempio from /data/options.json.

general =
{
	name = "%% name %%";
	interpolation = "%% interpolation %%";
	drift_tolerance_in_seconds = %% drift_tolerance_seconds | float %%;
	ignore_volume_control = "{% if boolean("ignore_volume_control") %}yes{% else %}no{% endif %}";
	port = 7000;
	audio_backend_buffer_desired_length_in_seconds = %% buffer_length_seconds | float %%;
};

alsa =
{
	output_device = "%% output_device %%";
{% if exists("mixer_control_name") %}
	mixer_control_name = "%% mixer_control_name %%";
{% endif %}
	output_rate = "%% output_rate | int %%";
	output_format = "%% output_format %%";
	output_channels = 2;
	period_size = %% period_size | int %%;
	buffer_size = %% buffer_size | int %%;
	disable_standby_mode = "%% disable_standby_mode %%";
	use_mmap_if_available = "no";
	use_precision_timing = "{% if boolean("use_precision_timing") %}yes{% else %}no{% endif %}";
	use_hardware_mute_if_available = "no";
};

diagnostics =
{
	log_verbosity = %% log_verbosity | int %%;
};
